##################################################
# METADATA
##################################################

# Depth measurements
[depth]
measurements = "./data/constant_depth_measurements.csv"

# Facies properties and mapping to labels in the segmented image
[facies]
props = "./data/facies.csv" # excel file with facies properties

[facies.0] # water and colorchecker
labels = [1, 2]
[facies.1] # caprock
labels = [3]
[facies.2] # storage
labels = [0]

##################################################
# GEOMETRY
##################################################

# Dimensions of the rig
[rig]
dim = 2       # dimension of the model
width = 0.92  # width of the model in m
height = 0.55 # height of the model in m

[image_porosity]
mode = "from_image"
tol = 0.9

# Additional options for from_image mode:
patches = [10, 10]
num_clusters = 5
sample_width = 50
tol_color_distance = 0.1
tol_color_gradient = 0.02

##################################################
# IMAGE PROCESSING
##################################################

# Denoising using a simple averaging filter.
[restoration]
method = "volume_average"

[restoration.options]
rev_size = 0.005 # meters

######################################################
# ROIs
######################################################

[roi.full]
name = "Full Domain"
corner_1 = [0.0, 0.0]
corner_2 = [0.92, 0.55]

[roi.calibration]
name = "full domain without cc"
corner_1 = [0.01, 0.45]
corner_2 = [0.90, 0.00]

# Finger analysis
[roi.fingers]
name = "Fingers in the left storage container associated with port 1"
corner_1 = [0.05, 0.15]
corner_2 = [0.30, 0.00]

[roi.storage]
name = "storage"
corner_1 = [0.0, 0.39]
corner_2 = [0.65, 0.0]

######################################################
# DATA SELECTION
######################################################

[data.time.calibration]
times = ["00:30:00", "01:30:00", "05:00:00", "12:00:00"]

[data.interval.analysis]
start = "01:00:00"
end = "24:00:00"
num = 24
tol = "00:05:00"

#####################################
# SIGNALS
#####################################

[color.path.color_path]
mode = "relative"
basis = "facies"
calibration_mode = "manual"
data = ["calibration"]
baseline = "baseline"
rois = ["calibration"]
ignore_baseline_spectrum = "none"
histogram_weighting = "wls"
ignore_labels = [0] # water and top layer
reference_label = 2 # Main storage layer
resolution = 21
num_segments = 3
threshold_baseline = 0.0
threshold_calibration = 1e-3

[calibration]
data = ["calibration"]

[calibration.color]
color = "color_path"
# TODO: move data from color paths here...

[calibration.mass]
data = "calibration" # TODO rm.
color = "color_path"

#####################################
# ANALYSIS
#####################################

[analysis]
data = ["analysis"]
formats = ["jpg"] #["jpg", "csv"]

[analysis.fingers]
mode = "concentration_aq" # Choose from std modes ("mass", "concentration_aq", ...) or "id" among color.*.<id>.
threshold = 0.1 # Choose sufficiently low.
roi = ["storage"] # Choose such that the top boundary crosses the plume.

[analysis.mass]
color = "color_path"
export = ["mass", "extensive_rescaled_mass", "rescaled_saturation_g", "rescaled_concentration_aq"]

#[analysis.expert_knowledge]
#saturation_g = ["storage"]
#rescaled_saturation_g = ["storage"]
#concentration_aq = ["storage", "caprock"]
#rescaled_concentration_aq = ["storage", "caprock"]

[analysis.segmentation.aqueous]
label = "CO2(aq)"
mode = "rescaled_concentration_aq"
thresholds = [0.05, 0.3, 0.5]
color = [120, 210, 255]
alpha = [0.5, 0.75, 1.0]
linewidth = 16
show_values = false
value_color = [255, 255, 255]
value_size = 4
value_alpha = 0.8
value_density = 0.5
value_min_distance_px = 35
value_max_per_contour = 4
value_format = "{:.2f}"

[analysis.segmentation.gas]
label = "CO2(g)"
mode = "rescaled_saturation_g"
thresholds = [0.001]
color = [0, 0, 150]
alpha = [1.0]
linewidth = 16

#####################################
# HELPER
#####################################

[helper.roi]
data = "calibration"

[helper.roi_viewer]
data = "calibration"

[helper.results]
data = "calibration"
mode = "extensive_rescaled_mass"
format = "csv"

#####################################
# FORMATS
#####################################

[format.jpg.jpg]
resolution = [1080, 4]
keep_ratio = true
name = "spatial_map_HH:MM"
cmap = "color_path.from_facies.7"
quality=100

[format.csv.csv]
resolution = [220, 368]
keep_ratio = false
float_format = "{:.3e}"
name = "spatial_map_HH:MM"

[format.npz.npz]
name = "spatial_map_HH:MM"

#####################################
# UTILS
#####################################

# For download of raw images to local filesystem
#[download]
#source = "\\\\klient.uib.no\\FELLES\\LAB-IT\\IFT\\resfys\\FluidFlower\\FF2 24-25 glass beads\\050825_glass_beads_1_150_s"

[video]

[video.source]
folder = "segmentation/jpg" # relative to [data.results] when not absolute
#folder = "mass/jpg" # relative to [data.results] when not absolute
#folder = "cropping" # relative to [data.results] when not absolute
#extensions = [".jpg"]
recursive = false
sorting = "name"

[video.output]
formats = ["mp4"]
fps = 6.0
codec = "mp4v"
quality = 100
# resolution = [1280, 720] # optional [width, height]

[video.overlay]
show_elapsed_time = false
elapsed_time_format = "Elapsed: {:.2f} h"
show_note = true
note = "FluidFlower BC02"
font_scale = 0.5
thickness = 2
text_color = [255, 255, 255]
position = [20, 20]
box_enabled = true
box_color = [0, 0, 0]
box_alpha = 0.4
box_padding = 10